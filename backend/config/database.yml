# MySQL. Versions 5.6.4 and up are supported.
default: &default
  adapter: mysql2
  encoding: utf8mb4
  collation: utf8mb4_unicode_ci
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: <%= ENV.fetch("DATABASE_USER") { "root" } %>
  password: <%= ENV.fetch("DATABASE_PASSWORD") { "" } %>
  host: <%= ENV.fetch("DATABASE_HOST") { "127.0.0.1" } %>
  port: <%= ENV.fetch("DATABASE_PORT") { 3306 } %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME") { "readingbook_development" } %>

test:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME_TEST") { "readingbook_test" } %>

# Production: AWS RDS for MySQL.
# Set DATABASE_URL or the individual env vars (DATABASE_HOST / DATABASE_USER /
# BACKEND_DATABASE_PASSWORD / DATABASE_NAME) at deploy time.
production:
  primary: &primary_production
    <<: *default
    database: <%= ENV.fetch("DATABASE_NAME") { "readingbook_production" } %>
    username: <%= ENV.fetch("DATABASE_USER") { "readingbook" } %>
    password: <%= ENV["BACKEND_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: <%= ENV.fetch("DATABASE_NAME_CACHE") { "readingbook_production_cache" } %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: <%= ENV.fetch("DATABASE_NAME_QUEUE") { "readingbook_production_queue" } %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: <%= ENV.fetch("DATABASE_NAME_CABLE") { "readingbook_production_cable" } %>
    migrations_paths: db/cable_migrate
